settings:
  fingerprint_strategy: "auto"
  deduplication_ttl: 300
  metrics_port: 9090

destinations:
  # Raw Block Kit example
  - name: slack-team-a-raw
    type: slack
    webhook_url: "${SLACK_WEBHOOK_URL}"
    template:
      content: |
        {
          "blocks": [
            {
              "type": "header",
              "text": {
                "type": "plain_text",
                "text": "{% if status == 'firing' %}🚨 Alert Firing{% else %}✅ Alert Resolved{% endif %}"
              }
            },
            {
              "type": "section",
              "fields": [
                {
                  "type": "mrkdwn",
                  "text": "*Group:*\n{{ group_name }}"
                },
                {
                  "type": "mrkdwn",
                  "text": "*Status:*\n{{ status }}"
                }
              ]
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Labels:*\n{% for key, value in labels.items() %}`{{ key }}`: `{{ value }}`\n{% endfor %}"
              }
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Annotations:*\n{% for key, value in annotations.items() %}`{{ key }}`: {{ value }}\n{% endfor %}"
              }
            }
          ]
        }

  # Structured Block Kit example (with body truncation and env var)
  - name: slack-team-a-structured
    type: slack
    webhook_url: "${SLACK_WEBHOOK_URL}"
    template:
      structured:
        blockkit:
          header:
            content: "{% if status == 'firing' %}🚨 Alert Firing ({{ alerts | length }}){% else %}✅ Alert Resolved ({{ alerts | length }}){% endif %}"
          body:
            content: "*Alert:* `{{ common_labels.alertname | default('N/A') }}` - {{ common_labels.severity | default('unknown') }}\n*Cluster:* `{{ common_labels.cluster | default('N/A') }}`\n*Summary:* {{ common_annotations.summary | default('No summary') }}\n*Messages:*\n{% for alert in alerts %}• <{{ env.RUNBOOK_URL }}#{{ alert.labels.alertname }}|{{ alert.annotations.description | default('No description') }}>\n{% endfor %}"
          footer:
            content: "Group: {{ group_name }}"

  # Structured Attachment example (legacy Slack format with color)
  - name: slack-team-a-attachment
    type: slack
    webhook_url: "${SLACK_WEBHOOK_URL}"
    template:
      structured:
        attachment:
          color: "{% if status == 'firing' %}danger{% else %}good{% endif %}"
          body:
            content: "{% if status == 'firing' %}🚨 Alert Firing ({{ alerts | length }}){% else %}✅ Alert Resolved ({{ alerts | length }}){% endif %}\n*Alert:* `{{ common_labels.severity | default('unknown') }}` - *{{ common_labels.alertname | default('N/A') }}*\n*Cluster:* `{{ common_labels.cluster | default('N/A') }}`\n*Summary:* {{ common_annotations.summary | default('No summary') }}\n*Messages:*\n{% for alert in alerts %}• <{{ env.RUNBOOK_URL }}#{{ alert.labels.alertname }}|{{ alert.annotations.description | default('No description') }}>\n{% endfor %}"

  # Raw Discord example
  - name: discord-alerts-raw
    type: discord
    webhook_url: "${DISCORD_WEBHOOK_URL}"
    template:
      content: |
        {
          "embeds": [
            {
              "title": "{% if status == 'firing' %}🚨 Alert Firing{% else %}✅ Alert Resolved{% endif %}",
              "color": 16711680 if status == 'firing' else 65280,
              "fields": [
                {"name": "Group", "value": "{{ group_name }}", "inline": true},
                {"name": "Status", "value": "{{ status }}", "inline": true},
                {"name": "Labels", "value": "{% for key, value in labels.items() %}`{{ key }}`: `{{ value }}`\n{% endfor %}"},
                {"name": "Annotations", "value": "{% for key, value in annotations.items() %}{{ key }}: {{ value }}\n{% endfor %}"}
              ]
            }
          ]
        }

  # Structured Discord Embed example
  - name: discord-alerts-structured
    type: discord
    webhook_url: "${DISCORD_WEBHOOK_URL}"
    template:
      structured:
        embed:
          header:
            content: "{% if status == 'firing' %}🚨 Alert Firing ({{ alerts | length }}){% else %}✅ Alert Resolved ({{ alerts | length }}){% endif %}"
          body:
            content: "*Alert:* `{{ common_labels.alertname | default('N/A') }}` - {{ common_labels.severity | default('unknown') }}\n*Cluster:* `{{ common_labels.cluster | default('N/A') }}`\n*Summary:* {{ common_annotations.summary | default('No summary') }}\n*Messages:*\n{% for alert in alerts %}• [{{ alert.annotations.description | default('No description') }}]({{ env.RUNBOOK_URL }}#{{ alert.labels.alertname }})\n{% endfor %}"
          footer:
            content: "Group: {{ group_name }}"

  # Stdout example (still uses raw content)
  - name: stdout-debug
    type: stdout
    template:
      content: |
        {% if status == 'firing' %}🚨 Alert Firing{% else %}✅ Alert Resolved{% endif %}
        Group: {{ group_name }}
        Status: {{ status }}
        {% for key, value in labels.items() %}{{ key }}: {{ value }}
        {% endfor %}
        {% for key, value in annotations.items() %}{{ key }}: {{ value }}
        {% endfor %}

groups:
  - name: team-a
    destinations:
      - slack-team-a-structured
    filters:
      - type: label_not_equals
        label: cluster
        values: [dev]
      - type: label_not_equals
        label: tenant
        values: [dev]
    match:
      - type: label_equals
        label: namespace
        values: [namespace-a, namespace-c]
      - type: label_matches
        label: container
        pattern: "container-a-.*"
      - type: label_contains
        label: queueName
        substring: "queue-a"

  - name: team-b
    destinations:
      - slack-team-a-structured
    match:
      - type: label_equals
        label: namespace
        values: [namespace-b]
      - type: label_matches
        label: namespace
        pattern: "pattern-.*"
