settings:
  fingerprint_strategy: "auto"
  deduplication_ttl: 300
  metrics_port: 9090

destinations:
  - name: slack-team-a
    type: slack
    webhook_url: "${SLACK_WEBHOOK_URL}"
    template:
      content: |
        {
          "blocks": [
            {
              "type": "header",
              "text": {
                "type": "plain_text",
                "text": "{% if status == 'firing' %}🚨 Alert Firing{% else %}✅ Alert Resolved{% endif %}"
              }
            },
            {
              "type": "section",
              "fields": [
                {
                  "type": "mrkdwn",
                  "text": "*Group:*\n{{ group_name }}"
                },
                {
                  "type": "mrkdwn",
                  "text": "*Status:*\n{{ status }}"
                }
              ]
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Labels:*\n{% for key, value in labels.items() %}`{{ key }}`: `{{ value }}`\n{% endfor %}"
              }
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Annotations:*\n{% for key, value in annotations.items() %}`{{ key }}`: {{ value }}\n{% endfor %}"
              }
            }
          ]
        }

  # Example using legacy attachments format (alternative to block kit above)
  # Uncomment to use this instead of the block kit format
  # - name: slack-team-a-legacy
  #   type: slack
  #   webhook_url: "${SLACK_WEBHOOK_URL}"
  #   attachments_template:
  #     content: |
  #       [
  #         {
  #           "color": "danger" if status == 'firing' else "good",
  #           "fields": [
  #             {"title": "Group", "value": "{{ group_name }}", "short": true},
  #             {"title": "Status", "value": "{{ status }}", "short": true}
  #           ],
  #           "text": "*Labels:*\n{% for key, value in labels.items() %}`{{ key }}`: `{{ value }}`\n{% endfor %}\n\n*Annotations:*\n{% for key, value in annotations.items() %}`{{ key }}`: {{ value }}\n{% endfor %}"
  #         }
  #       ]

  - name: discord-alerts
    type: discord
    webhook_url: "${DISCORD_WEBHOOK_URL}"
    template:
      content: |
        {
          "embeds": [
            {
              "title": "{% if status == 'firing' %}🚨 Alert Firing{% else %}✅ Alert Resolved{% endif %}",
              "color": 16711680 if status == 'firing' else 65280,
              "fields": [
                {"name": "Group", "value": "{{ group_name }}", "inline": true},
                {"name": "Status", "value": "{{ status }}", "inline": true},
                {"name": "Labels", "value": "{% for key, value in labels.items() %}`{{ key }}`: `{{ value }}`\n{% endfor %}"},
                {"name": "Annotations", "value": "{% for key, value in annotations.items() %}{{ key }}: {{ value }}\n{% endfor %}"}
              ]
            }
          ]
        }

  - name: stdout-debug
    type: stdout
    template:
      content: |
        {% if status == 'firing' %}🚨 Alert Firing{% else %}✅ Alert Resolved{% endif %}
        Group: {{ group_name }}
        Status: {{ status }}
        {% for key, value in labels.items() %}{{ key }}: {{ value }}
        {% endfor %}
        {% for key, value in annotations.items() %}{{ key }}: {{ value }}
        {% endfor %}

groups:
  - name: team-a
    destinations:
      - slack-team-a
    match:
      - type: label_equals
        label: namespace
        values: [namespace-a, namespace-c]
      - type: label_matches
        label: container
        pattern: "container-a-.*"
      - type: label_contains
        label: queueName
        substring: "queue-a"

  - name: team-b
    destinations:
      - slack-team-a
    match:
      - type: label_equals
        label: namespace
        values: [namespace-b]
      - type: label_matches
        label: namespace
        pattern: "pattern-.*"
