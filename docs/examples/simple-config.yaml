  #       label: namespace
  #       values: [team-a, team-production]

  # Uncomment to match alerts by severity
  # - name: critical-alerts
  #   destinations: [slack-alerts]
  #   match:
  #     # Match alerts with critical OR error severity
  #     - type: label_equals
  #       label: severity
  #       values: [critical, error]

  # Uncomment to match alerts by regex pattern
  # - name: database-alerts
  #   destinations: [slack-alerts]
  #   match:
  #     # Match alerts where container name ends with "-db-"
  #     - type: label_matches
  #       label: container
  #       pattern: ".*-db-.*"

  # Uncomment to match multiple rules (OR logic)
  # - name: important-alerts
  #   destinations: [slack-alerts]
  #   match:
  #     # Match if severity is critical OR container contains "database"
  #     - type: label_equals
  #       label: severity
  #       values: [critical]
  #     - type: label_contains
  #       label: container
  #       values: [database]

# How to use this configuration:
#
# 1. Save this as config.yaml in the Hermes directory
# 2. For development/testing:
#    python -m src.main
#    # Alerts will print to stdout (your terminal)
#
# 3. For Slack integration:
#    a. Uncomment the slack-alerts or slack-blockkit destination
#    b. Get a Slack webhook URL from https://api.slack.com/messaging/webhooks
#    c. Set environment variable: export SLACK_WEBHOOK_URL="your-webhook-url"
#    d. Uncomment and configure groups to match your alerts
#    e. Run: python -m src.main
#
# 4. Test with curl:
#    curl -X POST http://localhost:8080/webhook \
#      -H "Content-Type: application/json" \
#      -d '{
#        "alerts": [{
#          "status": "firing",
#          "labels": {"alertname": "TestAlert", "namespace": "production"},
#          "annotations": {"summary": "Test alert"},
#          "startsAt": "2024-01-01T00:00:00Z"
#        }]
#      }'
#
# 5. Verify in Slack or terminal output
