# Simple Hermes Configuration
# This is a complete, working configuration for getting started with Hermes
# Use this to learn the basics before moving to more complex setups

settings:
  # How to compute alert fingerprint (alert identity)
  # auto: Use Alertmanager fingerprint if available, else compute custom
  # alertmanager: Require Alertmanager fingerprint
  # custom: Always compute custom fingerprint
  fingerprint_strategy: "auto"

  # How long (in seconds) to keep alert state for deduplication
  # After this time, alert state is forgotten and duplicate alerts may be sent again
  deduplication_ttl: 300

  # Port for Prometheus metrics endpoint
  metrics_port: 9090

# Destinations define where alerts are sent
# You can have multiple destinations: slack, discord, stdout
destinations:
  # stdout destination prints alerts to the terminal
  # Great for testing and development
  - name: stdout-alerts
    type: stdout
    template:
      # Simple text template
      content: |
        Alert: {{ status }}
        Labels: {{ labels }}
        Annotations: {{ annotations }}
        StartsAt: {{ startsAt }}

  # Uncomment to use Slack
  # - name: slack-alerts
  #   type: slack
  #   # Use environment variable to keep webhook URL out of config
  #   webhook_url: "${SLACK_WEBHOOK_URL}"
  #   template:
  #     # Simple text format
  #     content: |
  #       {"text": "Alert: {{ status }} - {{ labels.alertname }}\n{{ annotations.summary }}"}

  # Uncomment to use Slack Block Kit (rich formatting)
  # - name: slack-blockkit
  #   type: slack
  #   webhook_url: "${SLACK_WEBHOOK_URL}"
  #   template:
  #     content: |
  #       {"blocks": [
  #         {"type": "section",
  #          "text": {"type": "mrkdwn",
  #                   "text": "{% if status == 'firing' %}🚨 *Alert Firing*{% else %}✅ *Alert Resolved*{% endif %}\n\n*Alert:* {{ labels.alertname }}\n*Status:* {{ status }}\n*Summary:* {{ annotations.summary }}"
  #                  }
  #          }
  #         }
  #       ]}

# Groups define how to match alerts and where to send them
# Each group can match alerts using multiple rules (OR logic)
# An alert can match multiple groups and be sent to multiple destinations
groups:
  # This group matches ALL alerts (useful for testing)
  - name: all-alerts
    destinations: [stdout-alerts]
    match:
      - type: always_match

  # Uncomment to match alerts by namespace
  # - name: team-a-alerts
  #   destinations: [slack-alerts]
  #   match:
  #     # Match alerts from team-a OR team-production namespaces
