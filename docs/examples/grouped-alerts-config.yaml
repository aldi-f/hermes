#
# Examples of grouping strategies:
#
# 1. Group by alertname and cluster:
#    - All HighMemory alerts in production cluster grouped together
#    - All HighMemory alerts in staging cluster grouped separately
#    - Useful: See all instances of same alert type in same cluster
#
# 2. Group by alertname only:
#    - All HighMemory alerts grouped together across all clusters
#    - Useful: See all instances of same alert type globally
#
# 3. Group by namespace:
#    - All alerts from same namespace grouped together
#    - Useful: Team ownership by namespace
#
# 4. Group by service and severity:
#    - All warning alerts for same service grouped together
#    - All critical alerts for same service grouped separately
#    - Useful: Service-level visibility with severity grouping
#
# 5. Deduplication window:
#    - Critical alerts: Remind every hour (deduplication_window: 3600)
#    - Warning alerts: Send once, wait for resolve (deduplication_window: 0)
#    - Useful: Critical alerts need ongoing visibility
#
# Next steps:
# - Read docs/tutorials/group-alerts.md for detailed guide
# - Read docs/concepts/deduplication.md for deduplication and windows
# - Modify this config for your environment
