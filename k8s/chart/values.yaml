replicaCount: 1

image:
  repository: ghcr.io/aldi-f/hermes
  pullPolicy: IfNotPresent
  tag: "" # If empty, defaults to the chart appVersion.

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  httpPort: 80
  metricsPort: 9090

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}
  # requests:
  #   memory: "64Mi"
  #   cpu: "50m"
  # limits:
  #   memory: "256Mi"
  #   cpu: "500m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

config:
  settings:
    fingerprint_strategy: "auto"
    deduplication_ttl: 300
    metrics_port: 9090

  destinations: []

  groups: []

# Config reload settings
configReload:
  enabled: true
  interval: 30  # seconds

# Environment variables from secrets/configMaps
envFrom: []
#  - secretRef:
#      name: my-webhook-secrets
#  - configMapRef:
#      name: my-config

# Additional environment variables
env: []
#  - name: SOME_VAR
#    value: "value"
#  - name: SECRET_VAR
#    valueFrom:
#      secretKeyRef:
#        name: some-secret
#        key: key-name

nodeSelector: {}

tolerations: []

affinity: {}

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s

redis:
  enabled: false
  # Option 1: Use existing secret containing full REDIS_URL
  existingSecret: ""
  existingSecretKey: "redis-url"

  # Option 2: Build from components (use existing secret with password if needed)
  url: "redis-master"
  port: 6379
  database: 0
