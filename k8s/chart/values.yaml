replicaCount: 1

image:
  repository: ghcr.io/aldi-f/hermes
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  httpPort: 80
  metricsPort: 9090

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "500m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

config:
  settings:
    fingerprint_strategy: "auto"
    deduplication_ttl: 300
    metrics_port: 9090

  destinations: []

  groups: []

secrets:
  redisUrl: ""

  slackWebhooks: {}

  discordWebhooks: {}

nodeSelector: {}

tolerations: []

affinity: {}

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
