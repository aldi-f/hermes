apiVersion: v1
kind: Service
metadata:
  name: hermes
  labels:
    app: hermes
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: hermes
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-metrics
  labels:
    app: hermes-metrics
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: metrics
  selector:
    app: hermes