apiVersion: v1
kind: Secret
metadata:
  name: hermes-secrets
type: Opaque
stringData:
  # Redis connection URL (optional)
  # redis-url: "redis://redis-service:6379/0"
  
  # Webhook URLs can be referenced by destinations via environment variables
  # Format: DESTINATION_{NAME}_WEBHOOK_URL
  # Example:
  # destination-slack-oxygen-webhook-url: "https://hooks.slack.com/services/xxx"
  # destination-discord-alerts-webhook-url: "https://discord.com/api/webhooks/xxx"
---
apiVersion: v1
kind: Secret
metadata:
  name: hermes-webhooks
type: Opaque
stringData:
  # Legacy webhook secrets (deprecated, use hermes-secrets instead)
  # slack-webhook: "https://hooks.slack.com/services/xxx"
  # discord-webhook: "https://discord.com/api/webhooks/xxx"